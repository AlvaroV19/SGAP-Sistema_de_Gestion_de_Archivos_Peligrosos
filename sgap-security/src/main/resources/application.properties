spring.application.name=sgap

# ===============================
# DATABASE
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sgap_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:12345}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# MINIO CONFIGURATION
# ===============================
minio.url=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ROOT_USER:minioadmin}
minio.secret-key=${MINIO_ROOT_PASSWORD:minioadmin}
minio.bucket=${MINIO_BUCKET:sgap}
minio.public-url=${MINIO_PUBLIC_URL:}

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# SECURITY / QUARANTINE
# ===============================
storage.quarantine.path=${QUARANTINE_PATH:./storage/quarantine}

# ===============================
# ASYNC FILE PROCESSING
# ===============================
file.processing.delay-ms=${FILE_PROCESSING_DELAY_MS:120000}
file.processing.async.core-pool-size=${ASYNC_CORE_POOL_SIZE:4}
file.processing.async.max-pool-size=${ASYNC_MAX_POOL_SIZE:8}
file.processing.async.queue-capacity=${ASYNC_QUEUE_CAPACITY:100}

# ===============================
# JWT CONFIGURATION
# ===============================
# IMPORTANTE: en produccion usar una clave de al menos 32 caracteres aleatorios
# y cargarla desde variable de entorno (nunca commitear la clave real)
jwt.secret=${JWT_SECRET:sgap-super-secret-key-change-in-production-32chars!!}
# Expiracion en milisegundos: 86400000 = 24 horas
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===============================
# CORS CONFIGURATION
# ===============================
# Origenes permitidos para el frontend Vue.js (Vite dev: 5173, prod: ajustar)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# ===============================
# SEED USERS (solo perfiles non-prod)
# ===============================
# Sobrescribir en produccion con variables de entorno
# SEED_ADMIN_PASSWORD, SEED_ANALYST_PASSWORD, SEED_USER_PASSWORD

# ===============================
# LOGGING DE SEGURIDAD
# ===============================
logging.level.backend.sgap.service.SecurityAnalysisService=INFO
logging.level.backend.sgap.service.QuarantineStorageService=INFO
logging.level.backend.sgap.service.ArchivoService=INFO
logging.level.backend.sgap.service.ArchivoProcessingService=INFO
logging.level.backend.sgap.service.DelayedProcessingService=INFO
logging.level.backend.sgap.service.TikaService=DEBUG
logging.level.frontend.sgap.security=DEBUG
logging.level.org.springframework.security=INFO
