services:
  minio:
    image: minio/minio:latest
    container_name: sgap-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Consola web

    volumes:
      - minio_data:/data

volumes:
  minio_data:
